<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ Kiwi Sonorisation</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@media (max-width: 768px) {
  .btn-dates-fixed {
    left: 50%;
    transform: translateX(-50%);
    bottom: 80px;
  }
}

/* ===== BOUTON MOBILE (caché par défaut) ===== */
.dates-btn {
  display: none;
}

/* ===== VERSION MOBILE ===== */
@media (max-width: 768px) {

  /* cacher bouton texte */
  .btn-dates-fixed {
    display: none;
  }

  /* afficher bouton rond */
  .dates-btn {
    display: flex;

    position: fixed;
    right: 15px;
    bottom: 240px;

    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 22px;

    justify-content: center;
    align-items: center;

    background: #22c55e;
    color: black;

    z-index: 9999;
    cursor: pointer;

    box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
  }
}


.dates-btn:hover {
  transform: scale(1.1);
}

@media (max-width: 768px) {
  .dates-btn {
    bottom: 240px;
  }
}

.btn-dates {
  display: inline-block;
  background: black;
  color: #22c55e;
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: bold;
  text-decoration: none;
  border: 2px solid #22c55e;

  /* effet néon */
  box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;

  transition: 0.3s;
}

.btn-dates:hover {
  background: #22c55e;
  color: black;

  transform: scale(1.05);

  box-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e;
}


.btn-dates-fixed {
  position: fixed;
  left: 15px;
  bottom: 20px;

  background: black;
  color: #22c55e;
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: bold;
  text-decoration: none;
  border: 2px solid #22c55e;

  box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;

  z-index: 9999;

  /* IMPORTANT : pas d’animation */
  animation: none;
}

html {
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: green;
}

/* ===== CONTAINER ===== */
.container-main {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}

/* ===== LOGO HAUT ===== */
.logo-top {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.logo-animated {
  width: 25vw;
  max-width: 260px;
  min-width: 120px;
  animation: pulseGlow 2s infinite alternate;
}

@keyframes pulseGlow {
  0% {
    transform: scale(1);
    filter: drop-shadow(0 0 5px #22c55e)
            drop-shadow(0 0 10px #22c55e);
  }
  50% {
    transform: scale(1.05);
    filter: drop-shadow(0 0 20px #22c55e)
            drop-shadow(0 0 40px #22c55e);
  }
  100% {
    transform: scale(1);
    filter: drop-shadow(0 0 5px #22c55e)
            drop-shadow(0 0 10px #22c55e);
  }
}

/* ===== LOGOS COTES ===== */
.logo-side {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 12vw;
  max-width: 500px;
  min-width: 120px;
  opacity: 0.50;
  z-index: 0;
  pointer-events: none;
}

.logo-side.left { left: 10px; }
.logo-side.right { right: 10px; }

/* ===== STYLE ===== */
.glow {
  text-shadow: 0 0 10px #22c55e, 0 0 30px #22c55e;
}

.card {
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(34,197,94,0.2);
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
  border-radius: 15px;
  padding: 20px;
}

.card-center {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80px;
}

.img-style {
  border-radius: 15px;
  cursor: pointer;
  transition: transform 0.3s, opacity 0.3s;
}
.img-style:hover {
  transform: scale(1.03);
}

.img-fixed {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* ===== MOBILE ===== */
@media (max-width: 1024px) {
  .logo-side {
    display: none;
  }
}

@media (max-width: 768px) {
  .logo-animated {
    width: 150px;
  }
}

/* ===== BOUTONS CONTACT ===== */
.call-btn, .whatsapp-btn, .email-btn {
  position: fixed;
  right: 15px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  font-size: 22px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: black;
  z-index: 9999;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* positions */
.call-btn { bottom: 140px; background: #22c55e; }
.email-btn { bottom: 75px; background: #22c55e; }
.whatsapp-btn { bottom: 10px; background: #25D366; }

/* hover effet */
.call-btn:hover,
.email-btn:hover,
.whatsapp-btn:hover {
  transform: scale(1.1);
  transition: 0.3s;
}

.call-btn, .email-btn {
  box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
}

.whatsapp-btn {
  box-shadow: 0 0 10px #25D366, 0 0 20px #25D366;
}

</style>
</head>

<body>

<!-- LOGOS COTES -->
<img src="logo.png" class="logo-side left">
<img src="logo.png" class="logo-side right">

<!-- CONTENU -->
<div class="container-main">

  <!-- LOGO CENTRE -->
  <div class="logo-top">
    <img src="logo.png" class="logo-animated">
  </div>

  <!-- TITRE -->
  <section class="text-center py-10 px-4">
    <h1 class="text-3xl md:text-5xl font-bold glow">
    </h1>
    <p class="mt-4 text-xl">🔥 Ambiance garantie 🔥</p>
  </section>

  <!-- PRESTATIONS -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <div class="card card-center">💍 Mariage</div>
    <div class="card card-center">🎂 Anniversaire</div>
    <div class="card card-center">👶 Baptême</div>
    <div class="card card-center">⛪ Communion</div>
    <div class="card card-center">🎤 Karaoké</div>
    <div class="card card-center">🔥 Soirée privée</div>
  </div>

  <!-- IMAGES -->
  <section class="py-16">
    <div class="grid md:grid-cols-3 gap-6">
      <img id="img1" class="img-style img-fixed">
      <img id="img2" class="img-style img-fixed">
      <img id="img3" class="img-style img-fixed">
    </div>
  </section>

  <!-- RESERVATION -->
  <section class="py-16 text-center">
    <h2 class="text-3xl glow mb-6">Demande de réservation</h2>

    <div class="max-w-xl mx-auto card">
      <input type="text" id="nom" placeholder="Votre nom" class="w-full p-3 rounded-xl text-black mb-3">
      <input type="email" id="email" placeholder="Votre email" class="w-full p-3 rounded-xl text-black mb-3">
     	<input type="date" id="date" class="w-full p-3 rounded-xl text-black mb-3">

      <select id="event" class="w-full p-3 rounded-xl text-black mb-3">
        <option value="">Choisir un événement</option>
        <option>💍 Mariage 💍</option>
        <option>🎂 Anniversaire 🎂</option>
        <option>👶 Baptême 👶</option>
        <option>⛪ Communion ⛪</option>
        <option>🎤 Karaoké 🎤</option>
        <option>🔥 Soirée privée 🔥</option>
      </select>

      <button onclick="reserver()" class="bg-green-500 px-8 py-4 rounded-xl text-black font-bold">
        Envoyer ma demande
      </button>
    </div>
  </section>

  <!-- AVIS -->
  <section class="py-16 text-center">
    <h2 class="text-3xl glow mb-10">⭐ Avis clients ⭐</h2>

    <div class="grid md:grid-cols-3 gap-6">
      <div id="avis1" class="card"></div>
      <div id="avis2" class="card"></div>
      <div id="avis3" class="card"></div>
    </div>
  </section>

  <!-- FORMULAIRE AVIS -->
  <section class="py-16 text-center">
    <h2 class="text-3xl glow mb-6">Laisser un avis </h2>

    <form action="https://formspree.io/f/xxxxabcd" method="POST" class="max-w-xl mx-auto card">

      <input type="text" name="nom" placeholder="Votre prénom" required class="w-full p-3 rounded-xl text-black mb-3">

      <textarea name="avis" placeholder="Votre avis..." required class="w-full p-3 rounded-xl text-black mb-3"></textarea>

      <select name="note" required class="w-full p-3 rounded-xl text-black mb-3">
        <option value="">Note</option>
        <option>⭐⭐⭐⭐⭐</option>
        <option>⭐⭐⭐⭐</option>
        <option>⭐⭐⭐</option>
        <option>⭐⭐</option>
        <option>⭐</option>
      </select>

      <button type="submit" class="bg-green-500 px-6 py-3 rounded-xl text-black font-bold">
        Envoyer mon avis
      </button>

    </form>
  </section>

</div>

<script>

// ===== IMAGES =====
const imagesSoiree = Array.from({length: 21}, (_, i) => "soiree" + (i+1) + ".jpg");

let currentSoireeIndex = 0;

function initImages() {
  const imgs = [img1, img2, img3];

  imgs.forEach(img => {
    const r = Math.floor(Math.random() * imagesSoiree.length);
    img.src = imagesSoiree[r];
    img.onclick = () => ouvrirGalerieSoiree(img.src);
  });
}

function changeImagesAuto() {
  const imgs = [img1, img2, img3];

  imgs.forEach(img => {
    img.style.opacity = 0;

    setTimeout(() => {
      let r;
      do {
        r = Math.floor(Math.random() * imagesSoiree.length);
      } while (img.src.includes(imagesSoiree[r]));

      img.src = imagesSoiree[r];
      img.style.opacity = 1;
    }, 300);
  });
}

initImages();
setInterval(changeImagesAuto, 3000);

// galerie
function ouvrirGalerieSoiree(src) {
  const filename = src.split("/").pop();
  currentSoireeIndex = imagesSoiree.indexOf(filename);

  const overlay = document.createElement("div");
  overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:9999;";

  overlay.innerHTML = `<img id="img-soiree" src="${src}" style="max-width:90%;max-height:90%;cursor:pointer;">`;

  document.body.appendChild(overlay);

  document.getElementById("img-soiree").onclick = nextSoiree;

  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.remove();
  };
}

function nextSoiree() {
  currentSoireeIndex = (currentSoireeIndex + 1) % imagesSoiree.length;
  document.getElementById("img-soiree").src = imagesSoiree[currentSoireeIndex];
}

// ===== AVIS =====
let currentIndex = 0;

const avisList = [
  { type: "text", text: "Soirée incroyable, ambiance au top !", note: "★★★★★", nom: "— Marie" },
  { type: "image", src: "avis1.jpg" },
  { type: "image", src: "avis2.jpg" },
  { type: "text", text: "DJ très professionnel, tout le monde a dansé !", note: "★★★★★", nom: "— Julien" },
  { type: "image", src: "avis3.jpg" }
];

const imagesAvis = avisList.filter(a => a.type === "image").map(a => a.src);

function ouvrirImage(index) {
  currentIndex = index;

  const overlay = document.createElement("div");
  overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:9999;";

  overlay.innerHTML = `<img id="lightbox-img" src="${imagesAvis[currentIndex]}" style="max-width:90%;max-height:90%;cursor:pointer;">`;

  document.body.appendChild(overlay);

  document.getElementById("lightbox-img").onclick = nextImage;

  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.remove();
  };
}

function nextImage() {
  currentIndex = (currentIndex + 1) % imagesAvis.length;
  document.getElementById("lightbox-img").src = imagesAvis[currentIndex];
}

function afficherAvis() {
  for (let i = 1; i <= 3; i++) {
    const avis = avisList[Math.floor(Math.random() * avisList.length)];

    if (avis.type === "text") {
      document.getElementById("avis"+i).innerHTML = `
        <p>"${avis.text}"</p>
        <p class="mt-3 text-green-400">${avis.note}</p>
        <p class="mt-2 text-green-500 text-sm">${avis.nom}</p>
      `;
    } else {
      const index = imagesAvis.indexOf(avis.src);
      document.getElementById("avis"+i).innerHTML = `
        <img src="${avis.src}" onclick="ouvrirImage(${index})"
        class="w-full h-48 object-contain border border-green-500 bg-black rounded-xl cursor-pointer">
      `;
    }
  }
}

afficherAvis();
setInterval(afficherAvis, 3000);

// ===== RESERVATION =====
function reserver() {
  const nom = document.getElementById("nom").value;
  const email = document.getElementById("email").value;
  const date = document.getElementById("date").value;
  const event = document.getElementById("event").value;

  const message = `Bonjour,%0A Nom : ${nom}%0A Email : ${email}%0A Date : ${date}%0A Événement : ${event}`;

  window.location.href =
    `mailto:contact@dj-kiwi-sonorisation.fr?subject=Demande réservation DJ&body=${message}`;
}

</script>
