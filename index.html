<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<title>DJ KIWI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: green;
  overflow-x: hidden;
}

.header-logo {
  width: 100%;
  height: 100px;
  background-image: url('logo.png');
  background-size: 180px;
  background-repeat: repeat-x;
  background-position: center;
  opacity: 0.25;
}

.glow {
  text-shadow: 0 0 10px #22c55e, 0 0 30px #22c55e;
}

.card {
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(34,197,94,0.2);
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
  border-radius: 15px;
  padding: 20px;
}

.img-style {
  border-radius: 15px;
  border: 1px solid rgba(34,197,94,0.3);
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.img-fixed {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.img-style:hover {
  transform: scale(1.03);
}

.call-btn, .whatsapp, .email-btn {
  position: fixed;
  right: 20px;
  padding: 15px;
  border-radius: 50%;
  font-size: 22px;
  color: black;
}

.call-btn { bottom: 90px; background: #22c55e; }
.whatsapp { bottom: 20px; background: #25D366; }
.email-btn { bottom: 160px; background: #22c55e; }
</style>
</head>

<body>

<div class="header-logo"></div>

<!-- HERO -->
<section class="text-center py-16 px-4">
  <h1 class="text-3xl md:text-5xl font-bold text-green-400 glow mb-4">
    DJ KIWI SONORISATION
  </h1>
  <p class="mt-4 text-green-400 text-xl">
    🎧🔥🔥🔥 Ambiance garantie🔥🔥🔥🎧
  </p>
  <p class="mt-2 text-green-500">
    Pas-de-calais
  </p>
</section>

<!-- PRESTATIONS -->
<section class="py-16 text-center px-4">
  <h2 class="text-3xl font-bold text-green-400 glow mb-10">Prestations</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
    <div class="card">💍 Mariage 💍</div>
    <div class="card">🎂 Anniversaire 🎂</div>
    <div class="card">👶 Baptême 👶</div>
    <div class="card">⛪ Communion ⛪</div>
    <div class="card">🎤 Karaoké 🎤</div>
    <div class="card">🔥 Soirée privée 🔥</div>
  </div>
</section>

<!-- AMBIANCE -->
<section class="py-16 text-center px-4">
  <h2 class="text-3xl font-bold text-green-400 glow mb-10">
    Ambiance garantie
  </h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
    <img id="img1" src="soiree1.jpg" class="img-style img-fixed">
    <img id="img2" src="soiree2.jpg" class="img-style img-fixed">
    <img id="img3" src="soiree3.jpg" class="img-style img-fixed">
  </div>
</section>

<!-- CALENDRIER -->
<section class="py-16 text-center px-4">
  <h2 class="text-3xl font-bold text-green-400 glow mb-6">
    📅 Disponibilités en temps réel
  </h2>

  <div id="calendar" class="max-w-5xl mx-auto bg-white rounded-xl p-4" style="min-height:500px;"></div>

  <div class="max-w-xl mx-auto mt-10 card">
    <h3 class="text-xl text-green-400 mb-4">📩 Demande de réservation</h3>

    <input type="text" id="nom" placeholder="Votre nom" class="w-full p-3 rounded-xl text-black mb-3">
    <input type="email" id="email" placeholder="Votre email" class="w-full p-3 rounded-xl text-black mb-3">
    <input type="date" id="date" class="w-full p-3 rounded-xl text-black mb-3">
    <input type="text" id="event" placeholder="Type d'événement" class="w-full p-3 rounded-xl text-black mb-3">

    <button onclick="reserver()" class="bg-green-500 px-6 py-3 rounded-xl text-black font-bold">
      📅 Réserver cette date
    </button>
  </div>
</section>

<!-- FLOAT -->
<a href="tel:0645267951" class="call-btn">📞</a>
<a href="https://wa.me/33645267951" class="whatsapp">💬</a>
<a href="mailto:contact@dj-kiwi-sonorisation.fr" class="email-btn">✉️</a>

<script>
let datesIndisponibles = [];

async function chargerCalendrier() {
  try {
    const url = "https://calendar.google.com/calendar/ical/contact%40dj-kiwi-sonorisation.fr/public/basic.ics";

    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
    const txt = await res.text();

    txt.split("BEGIN:VEVENT").forEach(e => {
      const m = e.match(/DTSTART[^:]*:(\d{8})/);

      if (m) {
        const d = m[1];
        datesIndisponibles.push(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`);
      }
    });

    console.log("Dates récupérées :", datesIndisponibles);

    initCalendar();

  } catch (e) {
    console.error("Erreur calendrier :", e);
  }
}

function initCalendar() {
  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',

    dateClick: function(info) {
      if (datesIndisponibles.includes(info.dateStr)) {
        alert("❌ Date déjà réservée");
        return;
      }

      document.getElementById("date").value = info.dateStr;
    },

    events: datesIndisponibles.map(d => ({
      title: "❌ Réservé",
      start: d,
      color: "red"
    }))
  });

  calendar.render();
}

document.addEventListener("DOMContentLoaded", chargerCalendrier);

function reserver() {
  const nom = document.getElementById("nom").value;
  const email = document.getElementById("email").value;
  const date = document.getElementById("date").value;
  const event = document.getElementById("event").value;

  const message = `Bonjour,%0A
Nom : ${nom}%0A
Email : ${email}%0A
Date : ${date}%0A
Événement : ${event}`;

  window.location.href =
    `mailto:contact@dj-kiwi-sonorisation.fr?subject=Réservation DJ&body=${message}`;
}
</script>

</body>
</html>
