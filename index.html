<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ KIWI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: green;
  overflow-x: hidden;
}

/* BANDEAU */
.header-logo {
  width: 100%;
  height: 100px;
  background-image: url('logo.png');
  background-size: 180px;
  background-repeat: repeat-x;
  background-position: center;
  opacity: 0.25;
}

/* Glow */
.glow {
  text-shadow: 0 0 10px #22c55e, 0 0 30px #22c55e;
}

/* Cards */
.card {
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(34,197,94,0.2);
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
  border-radius: 15px;
  padding: 20px;
}

/* Images PRO */
.img-style {
  border-radius: 15px;
  border: 1px solid rgba(34,197,94,0.3);
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

/* Taille uniforme */
.img-fixed {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* Responsive */
@media (min-width: 640px) {
  .img-fixed { height: 220px; }
}
@media (min-width: 768px) {
  .img-fixed { height: 260px; }
}

/* Hover léger */
.img-style:hover {
  transform: scale(1.03);
}

/* FADE */
#img1, #img2, #img3 {
  transition: opacity 0.6s ease;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* BOUTONS */
.call-btn, .whatsapp, .email-btn {
  position: fixed;
  right: 20px;
  padding: 15px;
  border-radius: 50%;
  font-size: 22px;
  color: black;
}

.call-btn { bottom: 90px; background: #22c55e; }
.whatsapp { bottom: 20px; background: #25D366; }
.email-btn { bottom: 160px; background: #22c55e; }

.call-btn:hover,
.whatsapp:hover,
.email-btn:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="header-logo"></div>

<!-- PRESTATIONS -->
<section class="py-16 text-center px-4">
  <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-green-400 glow mb-10">Prestations</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
    <div class="card">💍 Mariage</div>
    <div class="card">🎂 Anniversaire</div>
    <div class="card">👶 Baptême</div>
    <div class="card">⛪ Communion</div>
    <div class="card">🎤 Karaoké</div>
    <div class="card">🔥 Soirée privée</div>
  </div>
</section>

<!-- AMBIANCE -->
<section class="py-16 text-center px-4">
  <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-green-400 glow mb-10">
    Ambiance garantie
  </h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">

    <img id="img1" src="soiree1.jpg" class="img-style img-fixed">
    <img id="img2" src="soiree2.jpg" class="img-style img-fixed">
    <img id="img3" src="soiree3.jpg" class="img-style img-fixed">

  </div>
</section>

<!-- AMBIANCES -->
<section class="py-16 text-center px-4">
  <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-green-400 glow mb-8">
    Ambiance lumineuse
  </h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
    <img src="ambiance1.jpg" class="img-style img-fixed" onclick="openImg(this.src)">
    <img src="ambiance2.jpg" class="img-style img-fixed" onclick="openImg(this.src)">
    <img src="ambiance3.jpg" class="img-style img-fixed" onclick="openImg(this.src)">
    <img src="ambiance4.jpg" class="img-style img-fixed" onclick="openImg(this.src)">
    <img src="ambiance5.jpg" class="img-style img-fixed" onclick="openImg(this.src)">
    <img src="ambiance6.jpg" class="img-style img-fixed" onclick="openImg(this.src)">
  </div>
</section>

<div class="header-logo"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<!-- FLOAT BUTTONS -->
<a href="tel:0645267951" class="call-btn">📞</a>
<a href="https://wa.me/33645267951" class="whatsapp">💬</a>
<a href="mailto:contact@dj-kiwi-sonorisation.fr" class="email-btn">✉️</a>

<script>
function openImg(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

// SLIDER 3 IMAGES RANDOM
const total = 15;

function changeImages() {
  const imgs = [
    document.getElementById("img1"),
    document.getElementById("img2"),
    document.getElementById("img3")
  ];

  imgs.forEach(img => img.style.opacity = 0);

  setTimeout(() => {
    let used = [];

    for (let i = 0; i < 3; i++) {
      let rand;
      do {
        rand = Math.floor(Math.random() * total) + 1;
      } while (used.includes(rand));

      used.push(rand);
      imgs[i].src = "soiree" + rand + ".jpg";
    }

    imgs.forEach(img => img.style.opacity = 1);
  }, 300);
}

setInterval(changeImages, 3000);
</script>

</body>
</html>
