<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="DJ professionnel dans le Pas-de-Calais : mariage, anniversaire, soirée privée, karaoké. Ambiance garantie avec DJ Kiwi Sonorisation.">
<meta name="keywords" content="DJ Pas de Calais, DJ mariage, DJ anniversaire, DJ soirée, DJ Nord, DJ Boulogne, DJ Calais, DJ Dunkerque">
<meta name="author" content="DJ Kiwi Sonorisation">

<title>DJ Pas-de-Calais | Mariage, soirée, anniversaire | DJ Kiwi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: green;
  overflow-x: hidden;
}

.header-logo {
  width: 100%;
  height: 100px;
  background-image: url('logo.png');
  background-size: 180px;
  background-repeat: repeat-x;
  background-position: center;
  opacity: 0.25;
}

.glow {
  text-shadow: 0 0 10px #22c55e, 0 0 30px #22c55e;
}

.card {
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(34,197,94,0.2);
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
  border-radius: 15px;
  padding: 20px;
}

.card-center {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  min-height: 80px;
}

.img-style {
  border-radius: 15px;
  border: 1px solid rgba(34,197,94,0.3);
  transition: transform 0.3s;
  cursor: pointer;
}
.img-style:hover {
  transform: scale(1.03);
}

.img-fixed {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.avis-img {
  transition: transform 0.3s;
}
.avis-img:hover {
  transform: scale(1.03);
}

.call-btn, .whatsapp, .email-btn {
  position: fixed;
  right: 20px;
  padding: 15px;
  border-radius: 50%;
  font-size: 22px;
  color: black;
}

.call-btn { bottom: 90px; background: #22c55e; }
.whatsapp { bottom: 20px; background: #25D366; }
.email-btn { bottom: 160px; background: #22c55e; }
</style>
</head>

<body>

<div class="header-logo"></div>

<!-- HERO -->
<section class="text-center py-16 px-4">
  <h1 class="text-3xl md:text-5xl font-bold text-green-400 glow mb-4">
    DJ KIWI SONORISATION
  </h1>

  <p class="mt-4 text-green-400 text-xl">
    🎧🔥🔥🔥 Ambiance garantie 🔥🔥🔥🎧
  </p>

  <p class="mt-2 text-green-500">
    Pas-de-calais
  </p>
</section>

<!-- PRESTATIONS -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
  <div class="card card-center">💍 Mariage 💍</div>
  <div class="card card-center">🎂 Anniversaire 🎂</div>
  <div class="card card-center">👶 Baptême 👶</div>
  <div class="card card-center">⛪ Communion ⛪</div>
  <div class="card card-center">🎤 Karaoké 🎤</div>
  <div class="card card-center">🔥 Soirée privée 🔥</div>
</div>

<!-- AMBIANCE -->
<section class="py-16 text-center px-4">
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
<img id="img1" src="soiree1.jpg" onclick="ouvrirGalerieSoiree(this.src)" class="img-style img-fixed">
<img id="img2" src="soiree2.jpg" onclick="ouvrirGalerieSoiree(this.src)" class="img-style img-fixed">
<img id="img3" src="soiree3.jpg" onclick="ouvrirGalerieSoiree(this.src)" class="img-style img-fixed">
  </div>
</section>

<!-- RESERVATION -->
<section class="py-16 text-center px-4">
  <h2 class="text-3xl font-bold text-green-400 glow mb-6">
    📩 Demande de réservation
  </h2>

  <div class="max-w-xl mx-auto card">
    <input type="text" id="nom" placeholder="Votre nom" class="w-full p-3 rounded-xl text-black mb-3">
    <input type="email" id="email" placeholder="Votre email" class="w-full p-3 rounded-xl text-black mb-3">
    <input type="date" id="date" class="w-full p-3 rounded-xl text-black mb-3">

    <select id="event" class="w-full p-3 rounded-xl text-black mb-3">
      <option value="">Choisir un événement</option>
      <option>Mariage</option>
      <option>Anniversaire</option>
      <option>Baptême</option>
      <option>Communion</option>
      <option>Karaoké</option>
      <option>Soirée privée</option>
      <option>Autre</option>
    </select>

    <button onclick="reserver()" class="bg-green-500 px-8 py-4 rounded-xl text-black font-bold">
      🚀 Envoyer ma demande
    </button>
  </div>
</section>

<!-- AVIS -->
<section class="py-16 text-center px-4">
  <h2 class="text-3xl font-bold text-green-400 glow mb-10">
    ⭐ Avis clients ⭐
  </h2>

  <div class="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto">
    <div id="avis1" class="card"></div>
    <div id="avis2" class="card"></div>
    <div id="avis3" class="card"></div>
  </div>
</section>

<!-- FORMULAIRE AVIS -->
<section class="py-16 text-center px-4">
  <h2 class="text-3xl font-bold text-green-400 glow mb-6">
    ✍️ Laisser un avis
  </h2>

  <div class="max-w-xl mx-auto card">
    <input type="text" name="nom" placeholder="Votre prénom" class="w-full p-3 rounded-xl text-black mb-3">
    <textarea name="avis" placeholder="Votre avis..." class="w-full p-3 rounded-xl text-black mb-3"></textarea>

    <select name="note" class="w-full p-3 rounded-xl text-black mb-3">
      <option value="">Note</option>
      <option>⭐⭐⭐⭐⭐</option>
      <option>⭐⭐⭐⭐</option>
      <option>⭐⭐⭐</option>
      <option>⭐⭐</option>
      <option>⭐</option>
    </select>

    <button onclick="envoyerAvis()" class="bg-green-500 px-6 py-3 rounded-xl text-black font-bold">
      ⭐ Envoyer mon avis
    </button>
  </div>
</section>

<!-- FLOAT -->
<a href="tel:0645267951" class="call-btn">📞</a>
<a href="https://wa.me/33645267951" class="whatsapp">💬</a>
<a href="mailto:contact@dj-kiwi-sonorisation.fr" class="email-btn">✉️</a>

<script>
// SLIDER IMAGES
const total = 15;
const imagesSoiree = Array.from({length: 15}, (_, i) => "soiree" + (i+1) + ".jpg");

function changeImages() {
  const imgs = [img1, img2, img3];
  imgs.forEach(i => i.style.opacity = 0);

  setTimeout(() => {
    let used = [];
    for (let i = 0; i < 3; i++) {
      let r;
      do { r = Math.floor(Math.random()*total)+1; } while (used.includes(r));
      used.push(r);
      imgs[i].src = "soiree"+r+".jpg";
    }
    imgs.forEach(i => i.style.opacity = 1);
  },300);
}
setInterval(changeImages,3000);

//////////////////////////////////////////////////
// 🔥 GALERIE SOIREE (NOUVEAU)
//////////////////////////////////////////////////

let currentSoireeIndex = 0;

function ouvrirGalerieSoiree(src) {
  currentSoireeIndex = imagesSoiree.indexOf(src);

  const overlay = document.createElement("div");
  overlay.id = "lightbox-soiree";

  overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;z-index:9999;";

  overlay.innerHTML = `
    <div style="position:relative;">
      <img id="img-soiree" src="${src}" style="max-width:95%;max-height:80%;border-radius:15px;">

      <div onclick="prevSoiree()" style="position:absolute;left:10px;top:50%;font-size:40px;color:white;cursor:pointer;">⬅️</div>
      <div onclick="nextSoiree()" style="position:absolute;right:10px;top:50%;font-size:40px;color:white;cursor:pointer;">➡️</div>
      <div onclick="fermerSoiree()" style="position:absolute;top:-40px;right:0;font-size:30px;color:white;cursor:pointer;">✖</div>
    </div>
  `;

  document.body.appendChild(overlay);
}

function nextSoiree() {
  currentSoireeIndex = (currentSoireeIndex + 1) % imagesSoiree.length;
  document.getElementById("img-soiree").src = imagesSoiree[currentSoireeIndex];
}

function prevSoiree() {
  currentSoireeIndex = (currentSoireeIndex - 1 + imagesSoiree.length) % imagesSoiree.length;
  document.getElementById("img-soiree").src = imagesSoiree[currentSoireeIndex];
}

function fermerSoiree() {
  document.getElementById("lightbox-soiree").remove();
}

//////////////////////////////////////////////////
// 🔥 GALERIE AVIS (INCHANGÉE MAIS FIX MOBILE)
//////////////////////////////////////////////////

let currentIndex = 0;

const avisList = [
  { type: "text", text: "Soirée incroyable, ambiance au top !", note: "★★★★★", nom: "— Marie" },
  { type: "image", src: "avis1.jpg" },
  { type: "image", src: "avis2.jpg" },
  { type: "text", text: "DJ très professionnel, tout le monde a dansé !", note: "★★★★★", nom: "— Julien" },
  { type: "image", src: "avis3.jpg" }
];

const imagesAvis = avisList.filter(a => a.type === "image").map(a => a.src);

function ouvrirImage(index) {
  currentIndex = index;

  const overlay = document.createElement("div");
  overlay.id = "lightbox";

  overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;z-index:9999;";

  overlay.innerHTML = `
    <div style="position:relative;">
      <img id="lightbox-img" src="${imagesAvis[currentIndex]}" style="max-width:95%;max-height:80%;border-radius:15px;">

      <div onclick="prevImage()" style="position:absolute;left:10px;top:50%;font-size:40px;color:white;cursor:pointer;">⬅️</div>
      <div onclick="nextImage()" style="position:absolute;right:10px;top:50%;font-size:40px;color:white;cursor:pointer;">➡️</div>
      <div onclick="fermerLightbox()" style="position:absolute;top:-40px;right:0;font-size:30px;color:white;cursor:pointer;">✖</div>
    </div>
  `;

  document.body.appendChild(overlay);
}

function nextImage() {
  currentIndex = (currentIndex + 1) % imagesAvis.length;
  document.getElementById("lightbox-img").src = imagesAvis[currentIndex];
}

function prevImage() {
  currentIndex = (currentIndex - 1 + imagesAvis.length) % imagesAvis.length;
  document.getElementById("lightbox-img").src = imagesAvis[currentIndex];
}

function fermerLightbox() {
  document.getElementById("lightbox").remove();
}

//////////////////////////////////////////////////
// 🔥 CLAVIER (LES 2 GALERIES)
//////////////////////////////////////////////////

document.addEventListener("keydown", function(e) {

  if (document.getElementById("lightbox")) {
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
    if (e.key === "Escape") fermerLightbox();
  }

  if (document.getElementById("lightbox-soiree")) {
    if (e.key === "ArrowRight") nextSoiree();
    if (e.key === "ArrowLeft") prevSoiree();
    if (e.key === "Escape") fermerSoiree();
  }

});

//////////////////////////////////////////////////
// AVIS AUTO
//////////////////////////////////////////////////

function afficherAvis() {
  let used = [];

  for (let i = 1; i <= 3; i++) {
    let rand;
    do {
      rand = Math.floor(Math.random() * avisList.length);
    } while (used.includes(rand));

    used.push(rand);

    const avis = avisList[rand];

    if (avis.type === "text") {
      document.getElementById("avis"+i).innerHTML = `
        <p>"${avis.text}"</p>
        <p class="mt-3 text-green-400">${avis.note}</p>
        <p class="mt-2 text-green-500 text-sm">${avis.nom}</p>
      `;
    } else {
      const index = imagesAvis.indexOf(avis.src);

      document.getElementById("avis"+i).innerHTML = `
        <img src="${avis.src}" onclick="ouvrirImage(${index})"
        class="avis-img w-full h-48 object-contain border border-green-500 bg-black rounded-xl cursor-pointer">
      `;
    }
  }
}

afficherAvis();
setInterval(afficherAvis, 4000);

//////////////////////////////////////////////////
// FORMULAIRES (inchangé)
//////////////////////////////////////////////////

function reserver() {
  const nom = document.getElementById("nom").value;
  const email = document.getElementById("email").value;
  const date = document.getElementById("date").value;
  const event = document.getElementById("event").value;

  const message = `Bonjour,%0A
Nom : ${nom}%0A
Email : ${email}%0A
Date : ${date}%0A
Événement : ${event}`;

  window.location.href =
    `mailto:contact@dj-kiwi-sonorisation.fr?subject=Demande réservation DJ&body=${message}`;
}

function envoyerAvis() {
  const nom = document.querySelector("[name=nom]").value;
  const avis = document.querySelector("[name=avis]").value;
  const note = document.querySelector("[name=note]").value;

  const message = `Avis client%0A
Nom : ${nom}%0A
Note : ${note}%0A
Avis : ${avis}`;

  window.location.href =
    `mailto:contact@dj-kiwi-sonorisation.fr?subject=Nouvel avis client&body=${message}`;
}
</script>

</body>
</html>
