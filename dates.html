<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ Kiwi - Dates</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: black;
  color: green;
  font-family: Arial;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(34,197,94,0.2);
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
  border-radius: 15px;
  padding: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;"></h1>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

  <div class="card">
    <img src="flyer2.jpg" style="width:100%;border-radius:10px;">
  </div>

  <div class="card">
    <img src="flyer1.jpg" style="width:100%;border-radius:10px;">
  </div>

  <div class="card">
    <img src="flyer3.jpg" style="width:100%;border-radius:10px;">
  </div>

</div>

</div>

</body>
</html>
